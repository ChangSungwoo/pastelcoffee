<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pastel Coffee Works — v3 메인 페이지 시안</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />

<style>
/* ════════════════════════════════════════════════
   DESIGN TOOL CHROME (toolbar + frames)
   ════════════════════════════════════════════════ */
:root {
  --ink:        #4D2F19;
  --ink-2:      #6f513a;
  --ink-3:      #a98f78;
  --ink-line:   rgba(77, 47, 25, 0.14);
  --ink-line-2: rgba(77, 47, 25, 0.32);
  --paper:      #FAF6EE;
  --paper-2:    #f3ecdf;
  --paper-3:    #ebe2cf;
  --paper-soft: #E1DCD7;
  --serif:      'Cormorant Garamond', 'Nanum Myeongjo', Georgia, serif;
  --serif-ko:   'Nanum Myeongjo', 'Cormorant Garamond', serif;
  --sans:       'Pretendard', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background-color: #ece5d2;
  background-image:
    radial-gradient(1200px 600px at 10% -10%, rgba(255,235,200,0.6), transparent 60%),
    radial-gradient(1000px 500px at 90% 110%, rgba(220,210,180,0.5), transparent 60%);
  min-height: 100vh;
  font-family: var(--sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

.toolbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--paper);
  border-bottom: 1.5px solid var(--ink);
  padding: 12px 22px;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.toolbar .brand {
  font-family: var(--serif); font-weight: 600; font-size: 18px; letter-spacing: 2px;
}
.toolbar .brand small {
  font-family: var(--sans); font-weight: 400; font-size: 12px; color: var(--ink-2); margin-left: 8px; letter-spacing: 0;
}
.seg { display: inline-flex; border: 1.5px solid var(--ink); border-radius: 2px; overflow: hidden; }
.seg button {
  border: 0; background: transparent; padding: 7px 14px;
  font-family: var(--sans); font-size: 13px; cursor: pointer; color: var(--ink);
}
.seg button + button { border-left: 1.5px solid var(--ink); }
.seg button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }

.intro {
  max-width: 1320px;
  margin: 16px auto 0;
  padding: 14px 22px;
  background: var(--paper);
  border: 1px dashed var(--ink-line-2);
  font-family: var(--sans); font-size: 13px; color: var(--ink-2); line-height: 1.6;
}
.intro b { color: var(--ink); }
.intro h2 { font-family: var(--serif); font-size: 22px; color: var(--ink); margin: 0 0 6px; font-weight: 500; letter-spacing: -0.01em; }

.stage-wrap { padding: 22px 22px 60px; display: grid; gap: 24px; justify-content: center; }
.stage-row { display: grid; gap: 24px; justify-content: center; align-items: start; }
.stage-row.both { grid-template-columns: 1280px 380px; }
.stage-row.desktop { grid-template-columns: 1280px; }
.stage-row.mobile { grid-template-columns: 380px; }
@media (max-width: 1400px) { .stage-row.both { grid-template-columns: 1fr; justify-items: center; } }

.frame {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  box-shadow: 6px 6px 0 var(--ink);
  overflow: hidden;
  position: relative;
}
.frame .label {
  position: absolute; top: -10px; left: 14px;
  background: var(--paper); padding: 0 8px;
  font-family: var(--serif); font-size: 12px; letter-spacing: 2px; font-weight: 500;
  z-index: 5;
}
.frame.desktop { width: 1280px; height: 2200px; overflow-y: auto; }
.frame.mobile  { width: 380px; height: 2000px; overflow-y: auto; }
.frame::-webkit-scrollbar { width: 6px; }
.frame::-webkit-scrollbar-thumb { background: var(--ink-3); border-radius: 4px; }

/* ════════════════════════════════════════════════
   V3 PAGE — Aesop-style editorial
   ════════════════════════════════════════════════ */
.v3 { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.7; }
.v3 * { box-sizing: border-box; }
.v3 a { color: inherit; text-decoration: none; }
.v3 button { font-family: inherit; }
.v3 img { display: block; max-width: 100%; }
.v3 em { font-family: var(--serif); font-style: italic; }
.v3.m { font-size: 14px; }
::selection { background: var(--ink); color: var(--paper); }

/* — Reusable bits — */
.v3 .v3-num {
  display: block; font-family: var(--serif); font-size: 11px; letter-spacing: 0.32em;
  color: var(--ink-3); text-transform: uppercase; font-weight: 500;
  margin-bottom: 14px;
}
.v3 .v3-num--light { color: rgba(225,220,215,0.7); }
.v3 .v3-eyebrow {
  font-family: var(--serif); font-size: 11px; letter-spacing: 0.3em;
  color: var(--ink-2); text-transform: uppercase; font-weight: 500;
}
.v3 .v3-rule { height: 1px; background: var(--ink-line); margin: 32px 0; }

.v3 .v3-btn {
  display: inline-block; padding: 11px 20px;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  border: 1.5px solid var(--ink); background: transparent; color: var(--ink);
  cursor: pointer; letter-spacing: 0.02em; transition: all .15s;
}
.v3 .v3-btn:hover { background: var(--ink); color: var(--paper); }
.v3 .v3-btn--solid { background: var(--ink); color: var(--paper); }
.v3 .v3-btn--solid:hover { background: transparent; color: var(--ink); }
.v3 .v3-btn--ghost { border-color: transparent; padding-left: 0; }
.v3 .v3-btn--ghost:hover { background: transparent; color: var(--ink-2); }
.v3 .v3-btn--lg { padding: 14px 26px; font-size: 14px; }
.v3 .v3-btn--sm { padding: 7px 14px; font-size: 12px; }
.v3 .v3-link { font-family: var(--serif); font-size: 13px; letter-spacing: 0.15em; color: var(--ink-2); text-transform: uppercase; }

/* ── Header ── */
.v3-header { background: var(--paper); border-bottom: 1px solid var(--ink-line); }
.v3-header--d { padding: 18px 60px 14px; }
.v3-header--d .v3-header__top {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px;
}
.v3-header__eyebrow { font-family: var(--serif); font-size: 11px; letter-spacing: 0.32em; color: var(--ink-2); text-transform: uppercase; font-weight: 500; }
.v3-header__logo img { height: 28px; }
.v3-header__right { display: flex; justify-content: flex-end; gap: 14px; align-items: center; font-family: var(--serif); font-size: 12px; letter-spacing: 0.15em; color: var(--ink-2); }
.v3-header__search { border: 1px solid var(--ink-line-2); background: transparent; padding: 7px 14px; font-family: var(--serif); font-size: 12px; letter-spacing: 0.15em; color: var(--ink-2); cursor: pointer; }
.v3-iconbtn { border: 0; background: transparent; cursor: pointer; font-family: var(--serif); font-size: 14px; color: var(--ink); }
.v3-nav { margin-top: 16px; display: flex; justify-content: center; gap: 22px; font-family: var(--serif); font-size: 13px; letter-spacing: 0.38em; color: var(--ink); font-weight: 500; }
.v3-nav a { padding: 4px 0; border-bottom: 1.5px solid transparent; }
.v3-nav a:hover { border-bottom-color: var(--ink); }
.v3-nav__sep { color: var(--ink-3); }

.v3-header--m { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.v3-logo-m { height: 16px; }

/* ── Hero ── */
.v3-hero { position: relative; overflow: hidden; }
.v3-hero--d { height: 720px; }
.v3-hero--m { height: 600px; }
.v3-hero__bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: saturate(0.95);
}
.v3-hero__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(35,22,12,0.55) 0%, rgba(35,22,12,0.3) 40%, rgba(35,22,12,0.78) 100%);
}
.v3-hero__inner {
  position: relative; z-index: 2; height: 100%;
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 60px;
  color: var(--paper-soft);
  max-width: 760px;
}
.v3-hero--m .v3-hero__inner { padding: 0 22px; max-width: none; }
.v3-hero__eyebrow {
  font-family: var(--serif); font-size: 12px; letter-spacing: 0.42em;
  color: var(--paper-soft); margin-bottom: 22px; opacity: 0.85;
}
.v3-hero__title {
  font-family: var(--serif-ko); font-size: 84px; line-height: 1.05; margin: 0;
  font-weight: 700; color: var(--paper); letter-spacing: -0.02em;
}
.v3-hero--m .v3-hero__title { font-size: 44px; }
.v3-hero__italic {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  font-size: 38px; color: var(--paper-soft); margin-top: 8px; letter-spacing: -0.01em;
}
.v3-hero--m .v3-hero__italic { font-size: 24px; }
.v3-hero__lede {
  font-family: var(--serif-ko); font-size: 17px; line-height: 1.8;
  color: var(--paper-soft); margin: 24px 0 32px; max-width: 460px; opacity: 0.92;
}
.v3-hero--m .v3-hero__lede { font-size: 14px; margin: 16px 0 24px; }
.v3-hero__cta { display: flex; gap: 12px; flex-wrap: wrap; }
.v3-hero__cta .v3-btn { border-color: var(--paper-soft); color: var(--paper-soft); }
.v3-hero__cta .v3-btn--solid { background: var(--paper-soft); color: var(--ink); }
.v3-hero__cta .v3-btn:hover { background: var(--paper-soft); color: var(--ink); }
.v3-hero__cta .v3-btn--solid:hover { background: transparent; color: var(--paper-soft); }
.v3-hero__cta .v3-btn--ghost { border-color: transparent; }
.v3-hero__cta .v3-btn--ghost:hover { background: transparent; color: #fff; }
.v3-hero__scrolltag {
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 2;
  font-family: var(--serif); font-size: 11px; letter-spacing: 0.4em; color: var(--paper-soft); opacity: 0.7;
}

/* ── Generic section ── */
.v3-section { padding: 88px 60px; position: relative; }
.v3.m .v3-section { padding: 56px 20px; }
.v3-section--soft { background: var(--paper-2); }
.v3-section--dark { background: var(--ink); color: var(--paper-soft); }
.v3-section--dark em { color: var(--paper-soft); }
.v3-section__head { margin-bottom: 40px; }
.v3-section__head--center { text-align: center; max-width: 640px; margin-left: auto; margin-right: auto; }
.v3-section__h {
  font-family: var(--serif-ko); font-size: 42px; line-height: 1.2;
  font-weight: 700; margin: 0 0 14px; letter-spacing: -0.01em;
}
.v3.m .v3-section__h { font-size: 28px; }
.v3-section--dark .v3-section__h { color: var(--paper); }
.v3-section__sub {
  font-family: var(--serif-ko); font-size: 17px; line-height: 1.7;
  color: var(--ink-2); margin: 0; max-width: 640px;
}
.v3.m .v3-section__sub { font-size: 14px; }
.v3-section--dark .v3-section__sub { color: var(--paper-soft); opacity: 0.85; }

/* ── 03. Philosophy ── */
.v3-philosophy { text-align: center; max-width: 820px; margin: 0 auto; }
.v3-philosophy__h { font-family: var(--serif-ko); font-size: 48px; font-weight: 700; margin: 4px 0 28px; line-height: 1.2; letter-spacing: -0.02em; }
.v3.m .v3-philosophy__h { font-size: 32px; }
.v3-philosophy__body {
  font-family: var(--serif-ko); font-size: 22px; line-height: 1.85;
  color: var(--ink); font-weight: 400; max-width: 680px; margin: 0 auto 16px;
}
.v3-philosophy__body em { font-family: var(--serif); font-style: italic; color: var(--ink-2); }
.v3.m .v3-philosophy__body { font-size: 17px; }
.v3-philosophy__body--muted { color: var(--ink-2); }
.v3-philosophy .v3-rule { max-width: 80px; margin: 36px auto; background: var(--ink-line-2); }
.v3-philosophy__sig { font-family: var(--serif); font-size: 12px; letter-spacing: 0.3em; color: var(--ink-3); text-transform: uppercase; }

/* ── 04. Champion ── */
.v3-champ__grid { display: grid; grid-template-columns: 1fr 1.05fr; gap: 60px; align-items: center; }
.v3.m .v3-champ__grid { grid-template-columns: 1fr; gap: 28px; }
.v3-champ__img { position: relative; aspect-ratio: 4 / 5; background: var(--paper-2); border: 1px solid var(--ink-line); }
.v3-champ__img img { width: 100%; height: 100%; object-fit: contain; padding: 8%; }
.v3-champ__badge {
  position: absolute; top: 22px; right: 22px;
  font-family: var(--serif); font-size: 11px; letter-spacing: 0.18em;
  color: var(--ink); background: var(--paper); padding: 8px 12px;
  border: 1.5px solid var(--ink); line-height: 1.3; text-align: center;
}
.v3-champ__h { font-family: var(--serif-ko); margin: 14px 0 18px; line-height: 1.1; letter-spacing: -0.02em; }
.v3-champ__h-en { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 64px; color: var(--ink); display: inline-block; }
.v3-champ__h-ko { font-family: var(--serif-ko); font-weight: 700; font-size: 28px; color: var(--ink-2); display: inline-block; }
.v3.m .v3-champ__h-en { font-size: 42px; }
.v3.m .v3-champ__h-ko { font-size: 20px; }
.v3-champ__notes { font-family: var(--serif); font-size: 16px; letter-spacing: 0.15em; color: var(--ink-2); margin-bottom: 22px; font-style: italic; }
.v3.m .v3-champ__notes { font-size: 13px; }
.v3-champ__body { font-family: var(--serif-ko); font-size: 17px; line-height: 1.8; color: var(--ink); max-width: 480px; margin: 0 0 18px; }
.v3.m .v3-champ__body { font-size: 14px; }
.v3-champ__roastby {
  font-family: var(--serif); font-size: 12px; letter-spacing: 0.18em;
  color: var(--ink-2); text-transform: uppercase; padding: 14px 0;
  border-top: 1px solid var(--ink-line); border-bottom: 1px solid var(--ink-line);
  margin-bottom: 22px;
}
.v3-champ__roastby b { color: var(--ink); }
.v3-champ__buy { display: flex; flex-wrap: wrap; gap: 18px; align-items: center; justify-content: space-between; }
.v3-price { display: flex; align-items: baseline; gap: 6px; }
.v3-price__amt { font-family: var(--serif); font-size: 32px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.v3.m .v3-price__amt { font-size: 24px; }
.v3-price__unit { font-family: var(--serif); font-size: 13px; color: var(--ink-2); }
.v3-champ__btns { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── 05. House Blend ── */
.v3-house__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
.v3-house__grid--m { grid-template-columns: 1fr 1fr; gap: 12px; }
.v3-bean { background: var(--paper); border: 1px solid var(--ink-line); display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }
.v3-bean:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(77,47,25,0.08); }
.v3-bean__img { position: relative; aspect-ratio: 5 / 6; background: var(--paper-3); display: grid; place-items: center; overflow: hidden; }
.v3-bean__img img { width: 88%; height: 88%; object-fit: contain; }
.v3-bag { width: 80%; height: auto; }
.v3-bean__tag {
  position: absolute; top: 12px; left: 12px;
  font-family: var(--serif); font-size: 10px; letter-spacing: 0.22em;
  background: var(--ink); color: var(--paper); padding: 4px 8px;
}
.v3-bean__body { padding: 18px 18px 22px; }
.v3-bean__en { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink); font-weight: 500; }
.v3.m .v3-bean__en { font-size: 18px; }
.v3-bean__ko { font-family: var(--serif-ko); font-size: 14px; font-weight: 700; color: var(--ink-2); margin-top: 2px; }
.v3-bean__note { font-family: var(--serif); font-size: 12px; letter-spacing: 0.08em; color: var(--ink-3); margin: 10px 0; line-height: 1.5; min-height: 36px; }
.v3-bean__foot { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px dashed var(--ink-line); padding-top: 12px; margin-top: 4px; }
.v3-bean__price { font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--ink); }
.v3-bean__cta { font-family: var(--serif); font-size: 12px; letter-spacing: 0.15em; color: var(--ink-2); }

/* ── 06. Single Origin ── */
.v3-so__feature { display: grid; grid-template-columns: 1.05fr 1fr; gap: 60px; align-items: center; margin-bottom: 60px; }
.v3-so__feature--m { grid-template-columns: 1fr; gap: 24px; }
.v3-so__h { font-family: var(--serif); font-size: 64px; line-height: 1.05; font-weight: 400; color: var(--ink); margin: 14px 0 8px; letter-spacing: -0.02em; }
.v3.m .v3-so__h { font-size: 40px; }
.v3-so__h em { font-family: var(--serif); font-style: italic; color: var(--ink-2); }
.v3-so__ko { font-family: var(--serif-ko); font-size: 17px; font-weight: 700; color: var(--ink-2); margin-bottom: 14px; }
.v3-so__notes { font-family: var(--serif); font-size: 15px; letter-spacing: 0.12em; color: var(--ink-2); margin-bottom: 22px; font-style: italic; }
.v3-so__body { font-family: var(--serif-ko); font-size: 16px; line-height: 1.85; color: var(--ink); max-width: 460px; margin-bottom: 22px; }
.v3.m .v3-so__body { font-size: 14px; }
.v3-so__meta { list-style: none; padding: 0; margin: 0 0 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--ink-line); }
.v3-so__meta li { padding: 12px 0; border-bottom: 1px solid var(--ink-line); display: flex; justify-content: space-between; align-items: baseline; padding-right: 14px; }
.v3-so__meta li:nth-child(odd) { padding-right: 14px; }
.v3-so__meta li:nth-child(even) { padding-left: 14px; }
.v3-so__meta li span { font-family: var(--serif); font-size: 11px; letter-spacing: 0.22em; color: var(--ink-2); text-transform: uppercase; }
.v3-so__meta li b { font-family: var(--serif); font-size: 14px; color: var(--ink); font-weight: 500; }
.v3-so__buy { display: flex; align-items: baseline; gap: 22px; }
.v3-so__img { aspect-ratio: 4 / 5; overflow: hidden; background: var(--paper-3); }
.v3-so__img img { width: 100%; height: 100%; object-fit: cover; }

.v3-so__lineup { border-top: 1px solid var(--ink-line); padding-top: 32px; }
.v3-so__lineup-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 22px; }
.v3-so__row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
.v3-so__row--m { grid-template-columns: 1fr 1fr; gap: 14px; }
.v3-mini { display: flex; flex-direction: column; }
.v3-mini .v3-bag { width: 100%; max-width: 140px; align-self: center; margin-bottom: 10px; }
.v3-mini__en { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink); }
.v3-mini__ko { font-family: var(--serif-ko); font-size: 13px; font-weight: 700; color: var(--ink-2); margin-top: 2px; }
.v3-mini__note { font-family: var(--serif); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); margin-top: 6px; line-height: 1.5; }
.v3-mini__price { font-family: var(--serif); font-size: 14px; color: var(--ink); font-weight: 500; margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--ink-line); }

/* ── 07. Brew Pack & Drip Bag ── */
.v3-brew__grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 60px; align-items: center; }
.v3-brew__grid--m { grid-template-columns: 1fr; gap: 24px; }
.v3-brew__img { aspect-ratio: 4 / 3; overflow: hidden; background: var(--paper-3); }
.v3-brew__img img { width: 100%; height: 100%; object-fit: cover; }
.v3-brew__cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
.v3.m .v3-brew__cards { grid-template-columns: 1fr; }
.v3-brew__card { background: var(--paper); border: 1.5px solid var(--ink); padding: 22px; display: flex; flex-direction: column; }
.v3-brew__card-h { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--ink); font-weight: 500; }
.v3-brew__card-sub { font-family: var(--serif-ko); font-size: 13px; color: var(--ink-2); margin-top: 4px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed var(--ink-line); }
.v3-brew__card ul { padding: 0; margin: 0 0 18px; list-style: none; }
.v3-brew__card li { font-family: var(--serif-ko); font-size: 13px; color: var(--ink-2); padding: 6px 0; line-height: 1.5; padding-left: 14px; position: relative; }
.v3-brew__card li::before { content: '·'; position: absolute; left: 4px; color: var(--ink-3); }
.v3-brew__card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 14px; border-top: 1px solid var(--ink-line); }
